# Database Configuration
spring.datasource.url=jdbc:sqlserver://localhost\\SQLEXPRESS:1433;databaseName=clothingstore_db;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# Server configuration
server.port=8080

# File Upload configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging Configuration
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

# APIPay Integration
apipay.api-key=
apipay.bank-public-id=

# PayOS Integration
payos.client-id=${PAYOS_CLIENT_ID:}
payos.api-key=${PAYOS_API_KEY:}
payos.checksum-key=${PAYOS_CHECKSUM_KEY:}

# DeepSeek AI Integration
deepseek.api-key=${DEEPSEEK_API_KEY:}
deepseek.api-url=https://api.deepseek.com/chat/completions
